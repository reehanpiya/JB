<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Katalog Game - Otomatis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap");
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background: #020617;
        color: white;
      }
      .glass {
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 10px;
      }
    </style>
  </head>
  <body class="p-6 antialiased">
    <header class="max-w-6xl mx-auto mb-12 text-center">
      <h1 class="text-4xl font-extrabold text-sky-400 mb-2">GAME STORE</h1>
      <p class="text-slate-400 uppercase tracking-widest text-xs font-semibold">
        Live Katalog - Update via JSON
      </p>
    </header>

    <main
      id="katalog-grid"
      class="max-w-6xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"
    ></main>

    <div
      id="modal-detail"
      class="fixed inset-0 z-50 hidden bg-black/95 flex justify-center items-start overflow-y-auto p-4 py-10"
    >
      <div
        class="glass w-full max-w-5xl rounded-3xl overflow-hidden flex flex-col md:flex-row relative"
      >
        <button
          onclick="closeModal()"
          class="absolute top-4 right-4 z-50 p-2 bg-white/10 rounded-full"
        >
          ✕
        </button>

        <div class="w-full md:w-3/5 p-4 bg-black/20">
          <div
            class="aspect-video bg-slate-900 rounded-2xl overflow-hidden mb-4 border border-white/5"
          >
            <img id="main-view" src="" class="w-full h-full object-contain" />
          </div>
          <div
            id="filter-tag-container"
            class="flex gap-2 mb-4 overflow-x-auto pb-2 custom-scrollbar"
          ></div>
          <div
            id="thumb-container"
            class="grid grid-cols-5 gap-2 max-h-40 overflow-y-auto custom-scrollbar"
          ></div>
        </div>

        <div class="w-full md:w-2/5 p-8 flex flex-col justify-between">
          <div>
            <h2 id="m-title" class="text-3xl font-bold mb-2 leading-tight"></h2>
            <p
              id="m-price"
              class="text-2xl font-extrabold text-green-400 mb-6"
            ></p>
            <p
              id="m-desc"
              class="text-sm text-slate-400 mb-8 leading-relaxed"
            ></p>
          </div>
          <a
            id="m-wa"
            href="#"
            target="_blank"
            class="w-full bg-green-600 hover:bg-green-500 py-4 text-center rounded-2xl font-bold transition-all"
          >
            Beli via WhatsApp
          </a>
        </div>
      </div>
    </div>

    <script>
      let allData = [];
      let currentId = null;

      // FUNGSI UTAMA: Ambil data dari file JSON eksternal
      aasync function loadData() {
    try {
        const response = await fetch("data-akun.json?v=" + new Date().getTime());
        const rawData = await response.json();

        // Fungsi internal untuk menebak tag dari link
        const tebakTag = (url) => {
            const link = url.toLowerCase();
            if (link.includes('legend')) return 'Legend';
            if (link.includes('collector')) return 'Collector';
            if (link.includes('epic')) return 'Epic';
            if (link.includes('prime')) return 'Prime';
            if (link.includes('zodiac')) return 'Zodiac';
            return 'Lainnya';
        };

        // Proses data agar tag yang kosong otomatis terisi tebakan
        allData = (Array.isArray(rawData) ? rawData : [rawData]).map(akun => ({
            ...akun,
            koleksi_foto: akun.koleksi_foto.map(foto => ({
                src: foto.src,
                // Jika tag kosong, jalankan fungsi tebakTag
                tag: (foto.tag && foto.tag !== "") ? foto.tag : tebakTag(foto.src)
            }))
        }));

        renderCards();
    } catch (error) {
        console.error("Gagal memuat JSON:", error);
    }
}

        renderCards();
    } catch (error) {
        console.error("Gagal memuat JSON:", error);
        document.getElementById("katalog-grid").innerHTML =
            "<p class='col-span-full text-center'>Gagal memuat katalog. Pastikan format JSON benar.</p>";
    }
}

      function renderCards() {
  const grid = document.getElementById("katalog-grid");
  if (!Array.isArray(allData)) {
      console.error("Data bukan array!");
      return;
  }
  
  grid.innerHTML = allData
    .map(
      (d) => `
          <div class="glass rounded-3xl overflow-hidden hover:scale-[1.02] transition-all p-4">
              <img src="${d.koleksi_foto[0]?.src || ''}" class="w-full h-48 object-cover rounded-2xl mb-4" loading="lazy">
              <div class="px-2">
                  <h3 class="text-xl font-bold mb-1">${d.judul}</h3>
                  <p class="text-slate-500 text-sm mb-4">${d.pangkat || 'N/A'} | ${d.skin || 'N/A'}</p>
                  <div class="flex justify-between items-center">
                      <span class="text-lg font-bold text-green-400">Rp ${Number(d.harga).toLocaleString('id-ID')}</span>
                      <button onclick="openDetail('${d.id}')" class="bg-sky-600 hover:bg-sky-500 px-4 py-2 rounded-xl text-sm font-bold transition">Detail</button>
                  </div>
              </div>
          </div>
      `,
    )
    .join("");
}

      function openDetail(id) {
        currentId = id;
        const d = allData.find((item) => item.id === id);

        document.getElementById("m-title").innerText = d.judul;
        document.getElementById("m-price").innerText = d.harga;
        document.getElementById("m-desc").innerText = d.deskripsi;
        document.getElementById("m-wa").href =
          `https://wa.me/${d.wa}?text=Halo, minat akun ${d.judul}`;

        // Generate Filter Tags
        const tags = ["Semua", ...new Set(d.koleksi_foto.map((f) => f.tag))];
        const filterContainer = document.getElementById("filter-tag-container");
        filterContainer.innerHTML = tags
          .map(
            (t) => `
                <button onclick="applyFilter('${t}', this)" class="tag-btn whitespace-nowrap px-4 py-1.5 rounded-full border border-white/10 text-[10px] font-bold uppercase tracking-wider">
                    ${t}
                </button>
            `,
          )
          .join("");

        applyFilter("Semua", filterContainer.querySelector("button"));
        document.getElementById("modal-detail").classList.remove("hidden");
      }

      function applyFilter(tag, btn) {
        const d = allData.find((item) => item.id === currentId);
        const filtered =
          tag === "Semua"
            ? d.koleksi_foto
            : d.koleksi_foto.filter((f) => f.tag === tag);

        // Highlight Button
        document
          .querySelectorAll(".tag-btn")
          .forEach((b) => b.classList.replace("bg-sky-500", "bg-transparent"));
        btn.classList.replace("bg-transparent", "bg-sky-500");

        document.getElementById("main-view").src = filtered[0].src;

        const thumbContainer = document.getElementById("thumb-container");
        thumbContainer.innerHTML = filtered
          .map(
            (f) => `
                <img src="${f.src}" onclick="document.getElementById('main-view').src='${f.src}'" 
                     class="w-full aspect-square object-cover rounded-lg cursor-pointer opacity-50 hover:opacity-100 transition">
            `,
          )
          .join("");
      }

      function closeModal() {
        document.getElementById("modal-detail").classList.add("hidden");
      }

      // Jalankan saat load
      loadData();
    </script>
  </body>
</html>
