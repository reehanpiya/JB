<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GameStore - Live Katalog</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #080c14;
        --surface: #0f1623;
        --surface2: #161e2e;
        --border: rgba(255, 255, 255, 0.06);
        --border2: rgba(255, 255, 255, 0.12);
        --text: #e8edf5;
        --muted: #6b7a96;
        --accent: #3b82f6;
        --accent-dim: rgba(59, 130, 246, 0.15);
        --green: #22c55e;
        --green-dim: rgba(34, 197, 94, 0.12);
      }
      html,
      body {
        height: 100%;
        font-family: "Plus Jakarta Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      /* Topbar */
      .topbar {
        position: sticky;
        top: 0;
        z-index: 50;
        background: rgba(8, 12, 20, 0.9);
        backdrop-filter: blur(16px);
        border-bottom: 1px solid var(--border);
        padding: 14px 24px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      @media (min-width: 768px) {
        .topbar {
          flex-direction: row;
          align-items: center;
          gap: 16px;
        }
      }

      .topbar-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        width: 100%;
      }
      @media (min-width: 768px) {
        .topbar-header {
          width: auto;
        }
      }

      .logo {
        font-size: 17px;
        font-weight: 800;
        letter-spacing: -0.4px;
        flex-shrink: 0;
      }
      .logo b {
        color: var(--accent);
      }

      .filter-chips {
        display: flex;
        gap: 8px;
        flex: 1;
        justify-content: flex-start;
        overflow-x: auto;
        padding: 4px 0;
        scrollbar-width: none;
      }
      .filter-chips::-webkit-scrollbar {
        display: none;
      }

      .chip {
        padding: 7px 20px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 700;
        border: 1px solid var(--border2);
        color: var(--muted);
        cursor: pointer;
        white-space: nowrap;
        background: transparent;
        transition: all 0.15s;
      }
      .chip:hover {
        border-color: var(--accent);
        color: var(--text);
      }
      .chip.active {
        background: var(--accent-dim);
        border-color: var(--accent);
        color: #93c5fd;
      }

      .search-box {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--surface2);
        border: 1px solid var(--border2);
        border-radius: 10px;
        padding: 8px 14px;
        min-width: 190px;
        flex: 1;
        max-width: 320px;
      }
      .search-box input {
        background: none;
        border: none;
        outline: none;
        font-size: 13px;
        color: var(--text);
        width: 100%;
      }

      /* Hero, Section, Grid Card (tetap sama) */
      .hero {
        margin: 28px 28px 0;
        background: linear-gradient(
          135deg,
          #0f2040 0%,
          #0a1428 60%,
          #0f1623 100%
        );
        border: 1px solid var(--border2);
        border-radius: 20px;
        padding: 36px 44px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
      }
      @media (max-width: 767px) {
        .hero {
          margin: 20px 16px 0;
          padding: 28px 20px;
          flex-direction: column;
          text-align: center;
        }
      }

      .badge-pill {
        padding: 6px 16px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 700;
      }
      .badge-pill.blue {
        background: var(--accent-dim);
        border: 1px solid rgba(59, 130, 246, 0.3);
        color: #93c5fd;
      }
      .badge-pill.green {
        background: var(--green-dim);
        border: 1px solid rgba(34, 197, 94, 0.3);
        color: #86efac;
      }

      .section-header {
        padding: 24px 28px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      @media (max-width: 767px) {
        .section-header {
          padding: 20px 16px 12px;
        }
      }

      .katalog-grid {
        padding: 0 28px 48px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 18px;
      }
      @media (max-width: 767px) {
        .katalog-grid {
          padding: 0 16px 40px;
          grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        }
      }

      /* Card Styles */
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        overflow: hidden;
        cursor: pointer;
        transition:
          border-color 0.2s,
          transform 0.2s;
        display: flex;
        flex-direction: column;
      }
      .card:hover {
        border-color: var(--border2);
        transform: translateY(-3px);
      }
      .card-img {
        aspect-ratio: 16/10;
        background: var(--surface2);
        overflow: hidden;
        position: relative;
      }
      .card-img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.35s ease;
      }
      .card-img:hover img {
        transform: scale(1.05);
      }

      .badge-overlay {
        position: absolute;
        top: 10px;
        left: 10px;
      }
      .badge-sm {
        padding: 3px 10px;
        border-radius: 6px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .badge-sm.game-ml {
        background: rgba(0, 150, 255, 0.8);
        color: #fff;
      }
      .badge-sm.game-pub {
        background: rgba(255, 190, 0, 0.85);
        color: #1a1000;
      }
      .badge-sm.game-ff {
        background: rgba(255, 80, 0, 0.85);
        color: #fff;
      }

      .card-body {
        padding: 14px 16px;
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .card-id {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.08em;
        color: var(--muted);
        text-transform: uppercase;
      }
      .card-title {
        font-size: 14px;
        font-weight: 700;
        line-height: 1.4;
        height: 40px;
        overflow: hidden;
      }
      .card-tags {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .tag {
        padding: 3px 8px;
        border-radius: 5px;
        font-size: 10px;
        font-weight: 600;
        background: var(--surface2);
        color: var(--muted);
        border: 1px solid var(--border);
      }
      .card-footer {
        padding: 11px 16px;
        border-top: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .card-price {
        font-size: 15px;
        font-weight: 800;
        color: var(--green);
      }
      .card-cta {
        padding: 6px 14px;
        background: var(--accent-dim);
        border: 1px solid rgba(59, 130, 246, 0.25);
        border-radius: 8px;
        font-size: 11px;
        font-weight: 700;
        color: #93c5fd;
      }

      /* ================= MODAL ================= */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 200;
        background: rgba(0, 0, 0, 0.88);
        backdrop-filter: blur(8px);
        overflow-y: auto;
        padding: 40px 20px;
        align-items: flex-start;
        justify-content: center;
      }
      @media (max-width: 767px) {
        .modal-overlay {
          padding: 20px 12px;
        }
      }
      .modal-overlay.open {
        display: flex;
      }

      .modal {
        background: var(--surface);
        border: 1px solid var(--border2);
        border-radius: 24px;
        width: 95%;
        max-width: 1000px;
        max-height: 90vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        position: relative;
      }
      @media (min-width: 800px) {
        .modal {
          flex-direction: row;
        }
      }

      .modal-close {
        position: absolute;
        top: 14px;
        right: 14px;
        z-index: 10;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.07);
        border: 1px solid var(--border2);
        color: var(--muted);
        font-size: 15px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .modal-left {
        flex: 1.2;
        padding: 20px;
        background: #0b1120;
        display: flex;
        flex-direction: column;
        gap: 12px;
        overflow-y: auto;
      }

      .modal-main-img {
        aspect-ratio: 16/9;
        border-radius: 12px;
        overflow: hidden;
        background: var(--surface2);
        border: 1px solid var(--border);
      }
      .modal-main-img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* THUMBNAIL: Tetap 2 baris + bisa scroll horizontal */
      .modal-thumbs {
        display: grid;
        grid-template-rows: repeat(2, 55px);
        grid-auto-flow: column;
        gap: 8px;
        overflow-x: auto;
        overflow-y: hidden;
        padding-bottom: 10px;
        scrollbar-width: thin;
        -webkit-overflow-scrolling: touch;
      }
      .modal-thumbs::-webkit-scrollbar {
        height: 6px;
      }
      .modal-thumbs::-webkit-scrollbar-thumb {
        background: #1e2a3d;
        border-radius: 10px;
      }

      .modal-thumbs img {
        width: 85px;
        height: 55px;
        object-fit: cover;
        border-radius: 6px;
        cursor: pointer;
        border: 2px solid transparent;
        opacity: 0.7;
      }
      .modal-thumbs img.active {
        border-color: var(--accent);
        opacity: 1;
      }

      .modal-right {
        flex: 0.8;
        padding: 24px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        gap: 20px;
        background: var(--surface);
        border-left: 1px solid var(--border);
        overflow-y: auto;
      }
      @media (max-width: 799px) {
        .modal-right {
          border-left: none;
          padding: 20px;
        }
      }

      #m-title {
        font-size: 21px;
        font-weight: 800;
        line-height: 1.3;
      }
      #m-price {
        font-size: 24px;
        font-weight: 800;
        color: var(--green);
      }
      #m-wa {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 14px 20px;
        background: var(--green);
        border-radius: 13px;
        font-size: 14px;
        font-weight: 700;
        color: #052e16;
        text-decoration: none;
      }

      ::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }
      ::-webkit-scrollbar-thumb {
        background: #1e2a3d;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div class="logo">ER<b>STORE</b></div>
      <div class="filter-chips" id="filter-chips"></div>
      <div class="search-box">
        <svg
          width="13"
          height="13"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
        >
          <circle cx="11" cy="11" r="8" />
          <path d="m21 21-4.35-4.35" />
        </svg>
        <input
          type="text"
          placeholder="Cari akun..."
          id="search-input"
          oninput="renderKatalog()"
        />
      </div>
    </div>

    <div class="hero">
      <div class="hero-text">
        <h2>Jual Akun <span>Terpercaya</span></h2>
        <p>
          Mobile Legends, PUBG, Free Fire — akun siap pakai, harga terjangkau,
          transaksi aman via WhatsApp.
        </p>
      </div>
      <div class="hero-badges">
        <div class="badge-pill blue">✦ Fast Respon</div>
        <div class="badge-pill green">✓ Garansi Akun</div>
      </div>
    </div>

    <div class="section-header">
      <h3 id="section-title">Semua Akun</h3>
      <span id="section-count">Memuat data...</span>
    </div>

    <div class="katalog-grid" id="katalog-grid"></div>

    <div class="modal-overlay" id="modal-detail">
      <div class="modal">
        <button class="modal-close" onclick="closeModal()">✕</button>

        <div class="modal-left">
          <div class="modal-main-img">
            <img id="main-view" src="" alt="" />
          </div>

          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              padding: 10px 0;
              border-bottom: 1px solid var(--border2);
              margin-bottom: 5px;
            "
          >
            <span
              id="label-filter"
              style="font-size: 11px; font-weight: 700; color: var(--accent)"
              >Menampilkan: Semua Skin</span
            >

            <select
              id="skin-dropdown"
              onchange="handleDropdownChange(this)"
              style="
                background: var(--surface2);
                color: var(--text);
                border: 1px solid var(--border2);
                padding: 5px 10px;
                border-radius: 8px;
                font-size: 12px;
                outline: none;
              "
            ></select>
          </div>

          <div class="modal-thumbs" id="thumb-container"></div>
        </div>

        <div class="modal-right">
          <div class="modal-right-top">
            <h2 id="m-title"></h2>

            <div id="m-game-badge" style="margin: 10px 0"></div>

            <p id="m-price"></p>

            <div style="margin-top: 15px">
              <h4
                style="
                  font-size: 12px;
                  color: var(--text);
                  margin-bottom: 5px;
                  opacity: 0.8;
                "
              >
                Deskripsi Akun:
              </h4>
              <p
                id="m-desc"
                style="font-size: 13px; color: var(--muted); line-height: 1.7"
              ></p>
            </div>
          </div>

          <div class="modal-cta">
            <a id="m-wa" href="#" target="_blank">Beli via WhatsApp</a>
            <p
              style="
                font-size: 11px;
                color: var(--muted);
                text-align: center;
                margin-top: 10px;
              "
            >
              Respon cepat · Amanah · Terpercaya
            </p>
          </div>
        </div>
      </div>
    </div>

    <script>
      let allData = [];
      let aktifFilter = "semua";
      let currentAccount = null;

      // 1. Ambil Data JSON
      async function loadData() {
        try {
          const response = await fetch(
            "data-akun.json?v=" + new Date().getTime(),
          );
          const rawData = await response.json();

          const tebakTag = (url) => {
            const link = url.toLowerCase();
            if (link.includes("legend")) return "Legend";
            if (link.includes("collector")) return "Collector";
            if (link.includes("epic")) return "Epic";
            if (link.includes("prime")) return "Prime";
            if (link.includes("zodiac")) return "Zodiac";
            // return "Skin";
          };

          allData = (Array.isArray(rawData) ? rawData : [rawData]).map(
            (akun) => ({
              ...akun,
              koleksi_foto: akun.koleksi_foto.map((foto) => ({
                src: foto.src,
                tag:
                  foto.tag && foto.tag !== "" ? foto.tag : tebakTag(foto.src),
              })),
            }),
          );

          buatChips();
          renderKatalog();
        } catch (error) {
          console.error("Gagal memuat JSON:", error);
          document.getElementById("section-count").textContent =
            "Error memuat data.";
        }
      }

      // 2. Logika Filter Game
      function getGameType(id) {
        if (id.startsWith("ML"))
          return { key: "ml", label: "Mobile Legends", badge: "game-ml" };
        if (id.startsWith("PUB"))
          return { key: "pub", label: "PUBG", badge: "game-pub" };
        if (id.startsWith("FF"))
          return { key: "ff", label: "Free Fire", badge: "game-ff" };
        return { key: "other", label: "Game", badge: "game-ml" };
      }

      // 3. Filter Utama (Luar)
      function buatChips() {
        const filters = [
          { key: "semua", label: "Semua" },
          { key: "ml", label: "Mobile Legends" },
          { key: "pub", label: "PUBG" },
          { key: "ff", label: "Free Fire" },
        ];
        document.getElementById("filter-chips").innerHTML = filters
          .map(
            (f) => `
        <button class="chip ${f.key === aktifFilter ? "active" : ""}" onclick="setFilter('${f.key}')">
            ${f.label}
        </button>
    `,
          )
          .join("");
      }

      function setFilter(key) {
        aktifFilter = key;
        buatChips();
        renderKatalog();
      }

      // 4. Render Katalog
      function renderKatalog() {
        const search = document
          .getElementById("search-input")
          .value.toLowerCase();
        const grid = document.getElementById("katalog-grid");

        const filtered = allData.filter((a) => {
          const game = getGameType(a.id);
          return (
            (aktifFilter === "semua" || game.key === aktifFilter) &&
            (a.judul.toLowerCase().includes(search) ||
              a.id.toLowerCase().includes(search))
          );
        });

        document.getElementById("section-count").textContent =
          `${filtered.length} akun tersedia`;

        grid.innerHTML = filtered
          .map((a) => {
            const game = getGameType(a.id);
            const tagsUnik = [
              ...new Set(a.koleksi_foto.map((f) => f.tag)),
            ].slice(0, 3);
            return `
            <div class="card" onclick="bukaModal('${a.id}')">
                <div class="card-img">
                    <img src="${a.koleksi_foto[0].src}" loading="lazy" />
                    <div class="badge-overlay"><span class="badge-sm ${game.badge}">${game.label}</span></div>
                </div>
                <div class="card-body">
                    <div class="card-id">${a.id}</div>
                    <div class="card-title">${a.judul}</div>
                    <div class="card-tags">${tagsUnik.map((t) => `<span class="tag">${t}</span>`).join("")}</div>
                </div>
                <div class="card-footer">
                    <span class="card-price">Rp ${Number(a.harga).toLocaleString("id-ID")}</span>
                    <button class="card-cta">Detail</button>
                </div>
            </div>`;
          })
          .join("");
      }

      // 5. MODAL LOGIC (DIPERBAIKI)
      function bukaModal(id) {
        const a = allData.find((x) => x.id === id);
        if (!a) return;
        currentAccount = a;

        const game = getGameType(a.id);
        document.getElementById("m-title").textContent = a.judul;
        document.getElementById("m-price").textContent =
          "Rp " + Number(a.harga).toLocaleString("id-ID");
        document.getElementById("m-desc").textContent = a.deskripsi;
        document.getElementById("m-wa").href =
          `https://wa.me/${a.wa}?text=Halo Admin, saya minat akun ${a.judul} (${a.id})`;
        document.getElementById("m-game-badge").innerHTML =
          `<span class="badge-sm ${game.badge}">${game.label}</span>`;

        // Dropdown Skin
        const tagsUnik = [
          "Semua Skin",
          ...new Set(a.koleksi_foto.map((f) => f.tag)),
        ];
        const dropdown = document.getElementById("skin-dropdown");
        dropdown.innerHTML = tagsUnik
          .map((t) => `<option value="${t}">${t}</option>`)
          .join("");
        dropdown.value = "Semua Skin";

        applySkinFilter("Semua Skin");

        document.getElementById("modal-detail").classList.add("open");
        document.body.style.overflow = "hidden";
      }

      function closeModal() {
        document.getElementById("modal-detail").classList.remove("open");
        document.body.style.overflow = "auto";
      }

      function handleDropdownChange(select) {
        applySkinFilter(select.value);
      }

      function applySkinFilter(tag) {
        if (!currentAccount) return;

        document.getElementById("label-filter").textContent =
          `Menampilkan: ${tag}`;

        const filteredPhotos =
          tag === "Semua Skin"
            ? currentAccount.koleksi_foto
            : currentAccount.koleksi_foto.filter((f) => f.tag === tag);

        if (filteredPhotos.length > 0) {
          document.getElementById("main-view").src = filteredPhotos[0].src;
        }

        const thumbContainer = document.getElementById("thumb-container");
        thumbContainer.innerHTML = filteredPhotos
          .map(
            (f, i) => `
        <img src="${f.src}" class="${i === 0 ? "active" : ""}" 
             onclick="gantiGambar(this, '${f.src}')" />
    `,
          )
          .join("");
      }

      function gantiGambar(el, src) {
        document.getElementById("main-view").src = src;
        document
          .querySelectorAll(".modal-thumbs img")
          .forEach((i) => i.classList.remove("active"));
        el.classList.add("active");
      }

      // Jalankan saat start
      loadData();
    </script>
  </body>
</html>
